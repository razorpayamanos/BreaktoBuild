    // Camera-clipping cavity generation: compute on-demand per (col, row).
    // No global array; the React component iterates only the visible range.
    //
    // Random scatter with strict non-adjacency: cavities are admitted across
    // ALL THREE color classes of the brick-wall hex 3-coloring, not just one,
    // so the placement has no visible "every-Nth-cell" lattice. The 3-coloring
    // is used purely as a correctness scaffold: it guarantees that any two
    // same-color cells are never visual neighbors, which we exploit for a
    // recursive admission rule that's per-cell deterministic.
    //
    // Color formula: (c + 2·(r mod 2)) mod 3. Every cell's 6 visual neighbors
    // (3 same-row + cross-row pairs picked by row-parity offset) split exactly
    // 3-and-3 between the two OTHER colors.
    //
    // Admission rule (each rule references only the previous color's, so the
    // recursion bottoms out in ≤3 levels):
    //   • color 0 → density gate ρ₀                   (no neighbor check)
    //   • color 1 → density gate ρ₁ AND no color-0 visual nbr is a cavity
    //   • color 2 → density gate ρ₂ AND no color-0 or color-1 visual nbr is
    //               a cavity
    //
    // Non-adjacency proof sketch: if cell X is a color-0 cavity, every one of
    // its 6 visual neighbors is color 1 or 2 — and both of those rules reject
    // any cell whose color-0 neighbor is a cavity, so none of X's neighbors
    // can be cavities. Symmetric for X color 1 or 2. ∎
    //
    // Density tuning (independence approximation):
    //   total ≈ ρ₀/3 + ρ₁·(1-ρ₀)³/3 + ρ₂·(1-ρ₀)³·(1-ρ₁·(1-ρ₀)³)³/3
    //   For ρ₀=0.35, ρ₁=1, ρ₂=1: 11.7% + 9.2% + 3.5% ≈ 24%, split 48/38/14
    //   across colors — no single class dominates, so the lattice is hidden.
    const CAVITY_RHO_0 = 0.35;
    const CAVITY_RHO_1 = 1.00;
    const CAVITY_RHO_2 = 1.00;
    const CAVITY_COL_LIMIT = 400;
    const CAVITY_ROW_LIMIT = 200;
    function cavityHash(c, r) {
      let h = (c * 73856093) ^ (r * 19349663);
      h = (h ^ (h >>> 16)) >>> 0;
      return h;
    }
    function cavityHashU(h) { return (h & 0xffff) / 0xffff; }
    function cavityColor(c, r) {
      const m = (c + 2 * (r & 1)) % 3;
      return m < 0 ? m + 3 : m;
    }
    function cavityInBounds(c, r) {
      return c >= 0 && c < CAVITY_COL_LIMIT && r >= 0 && r < CAVITY_ROW_LIMIT;
    }
    // Visual 6-neighbor offsets — parity-aware due to brick row offset.
    function cavityForEachVisualNbr(c, r, fn) {
      const isOdd = (r & 1) === 1;
      const xL = isOdd ? c : c - 1;
      const xR = isOdd ? c + 1 : c;
      if (fn(c - 1, r)) return true;
      if (fn(c + 1, r)) return true;
      if (fn(xL, r - 1)) return true;
      if (fn(xR, r - 1)) return true;
      if (fn(xL, r + 1)) return true;
      if (fn(xR, r + 1)) return true;
      return false;
    }
    function isColor0Cavity(c, r) {
      if (!cavityInBounds(c, r)) return false;
      if (cavityColor(c, r) !== 0) return false;
      return cavityHashU(cavityHash(c, r)) < CAVITY_RHO_0;
    }
    function isColor1Cavity(c, r) {
      if (!cavityInBounds(c, r)) return false;
      if (cavityColor(c, r) !== 1) return false;
      if (cavityHashU(cavityHash(c, r)) >= CAVITY_RHO_1) return false;
      // Reject if any visual nbr is a color-0 cavity.
      const blocked = cavityForEachVisualNbr(c, r, isColor0Cavity);
      return !blocked;
    }
    function isColor2Cavity(c, r) {
      if (!cavityInBounds(c, r)) return false;
      if (cavityColor(c, r) !== 2) return false;
      if (cavityHashU(cavityHash(c, r)) >= CAVITY_RHO_2) return false;
      // Reject if any visual nbr is a color-0 OR color-1 cavity.
      const blocked = cavityForEachVisualNbr(c, r, (nc, nr) =>
        isColor0Cavity(nc, nr) || isColor1Cavity(nc, nr)
      );
      return !blocked;
    }
    function computePresetCavity(c, r) {
      if (!cavityInBounds(c, r)) return null;
      const color = cavityColor(c, r);
      const isCavity =
        color === 0 ? isColor0Cavity(c, r) :
          color === 1 ? isColor1Cavity(c, r) :
            isColor2Cavity(c, r);
      if (!isCavity) return null;
      const h = cavityHash(c, r);
      const f = FOUNDER_POOL[h % FOUNDER_POOL.length];
      return {
        col: c, row: r,
        founderName: f[0], company: f[1],
        text: `${f[0]} broke this brick to build ${f[1]}.`,
      };
    }

    function clampN(v: number, lo: number, hi: number) {
      if (lo > hi) return lo;
      return Math.max(lo, Math.min(hi, v));
    }
    function hash2D(col: number, row: number): number {
      let h = (col * 73856093) ^ (row * 19349663);
      h = (h ^ (h >>> 16)) >>> 0;
      return h;
    }
    function brickVariation(col: number, row: number) {
      const h = hash2D(col, row);
      const u = (n: number) => ((h >>> n) & 0xfff) / 0xfff;
      const hueShift = (u(0) - 0.5) * 6;
      const brightness = 1 + (u(7) - 0.5) * 0.18;
      const dx = (u(13) - 0.5) * 1.2;
      const dy = (u(19) - 0.5) * 1.2;
      const rotations = [0, 0.12, -0.12, 0.2];
      const rotation = rotations[h % 4];
      // Z-axis depth — most bricks sit flat on the wall plane, ~18% pop
      // forward (drop a soft shadow), ~8% sit slightly recessed (dimmed).
      // Independent hash so depth doesn't correlate with dx/dy/rotation.
      const depthHash = hash2D(col + 12345, row + 67890);
      const depthRaw = (depthHash & 0xffff) / 0xffff;
      const depth = depthRaw < 0.18 ? 1 : depthRaw > 0.92 ? -1 : 0;
      return { hueShift, brightness, dx, dy, rotation, depth };
    }
    function isTouchEnv(): boolean {
      if (typeof window === "undefined") return false;
      return "ontouchstart" in window || (navigator && navigator.maxTouchPoints > 0);
    }
    function brickScreenOffset(row: number, brickWidth: number) {
      return row % 2 === 1 ? brickWidth / 2 : 0;
    }

    const Brick = React.memo(function Brick({ col, row, brickWidth, brickHeight, brickImage, mortarColor, hovered }) {
      const v = brickVariation(col, row);
      const x = col * brickWidth + brickScreenOffset(row, brickWidth);
      const y = row * brickHeight;

      // Depth-aware styling. Closer bricks (depth=1) cast a soft shadow at
      // bottom-right (light from top-left convention) and sit above neighbors
      // so the shadow lands on whatever is behind. Recessed bricks (depth=-1)
      // dim slightly and sit below neighbors.
      const baseShadow =
        `inset 0 -2px 3px rgba(0,0,0,0.45),` +
        ` inset 0 2px 2px rgba(255,255,255,0.04),` +
        ` inset 1px 0 0 ${mortarColor},` +
        ` inset -1px 0 0 ${mortarColor}`;
      const dropShadow = v.depth === 1
        ? `, ${brickHeight * 0.10}px ${brickHeight * 0.10}px ${brickHeight * 0.22}px rgba(0,0,0,0.55)`
        : "";
      const brightnessAdjust = v.depth === -1 ? -0.10 : 0;
      const zIndex = v.depth === 1 ? 2 : v.depth === -1 ? 0 : 1;

      return (
        <div
          style={{
            position: "absolute", left: x, top: y, width: brickWidth, height: brickHeight,
            transform: `translate(${v.dx}px, ${v.dy}px) rotate(${v.rotation}deg)`,
            backgroundImage: `url(${brickImage})`,
            backgroundSize: "100% 100%",
            backgroundRepeat: "no-repeat",
            filter: `hue-rotate(${v.hueShift}deg) brightness(${v.brightness + brightnessAdjust})`,
            boxShadow: baseShadow + dropShadow,
            zIndex,
            pointerEvents: "none",
          }}
        >
          {hovered && (
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", alignItems: "flex-start", justifyContent: "flex-end",
              paddingRight: brickWidth * 0.05,
              // ↓ HOVER TEXT VERTICAL POSITION — increase to move further down
              paddingTop: brickHeight * 0.18,
              // ↑ HOVER TEXT VERTICAL POSITION
              fontFamily: '"TASA Orbiter", "Inter", system-ui, sans-serif',
              fontWeight: 400,
              fontSize: brickHeight * 0.2,
              letterSpacing: -0.6,
              color: "#ffffff",
              whiteSpace: "nowrap",
              pointerEvents: "none",
              gap: 4,
            }}>
              <span>Break this brick.</span>
              <span style={{ fontSize: brickHeight * 0.18, transform: "translateY(-1px)" }}>↗</span>
            </div>
          )}
        </div>
      );
    });

    function CavityView({ cavity, brickWidth, brickHeight }) {
      const x = cavity.col * brickWidth + brickScreenOffset(cavity.row, brickWidth);
      const y = cavity.row * brickHeight;
      const w = CAVITY_W_BRICKS * brickWidth;
      const h = CAVITY_H_BRICKS * brickHeight;
      // Figma 834:166 — TASA Orbiter Display, font size = 0.208 × brickHeight,
      // line-height 1.2, letter-spacing -0.04 × fontSize. Ratio-based so the
      // spec scales with brick height (and thus with brick image aspect).
      const fontSize = brickHeight * 0.208;
      const letterSpacing = fontSize * -0.04;
      return (
        <div style={{
          position: "absolute", left: x, top: y, width: w, height: h,
          background: "#030303",
          boxShadow: `
            inset 0 3px 8px rgba(0,0,0,0.9),
            inset 0 -2px 5px rgba(0,0,0,0.65),
            inset 3px 0 5px rgba(0,0,0,0.7),
            inset -3px 0 5px rgba(0,0,0,0.7)`,
          borderRadius: 1,
          display: "flex", flexDirection: "column", justifyContent: "center",
          padding: `${brickHeight * 0.08}px ${brickWidth * 0.05}px`,
          boxSizing: "border-box", overflow: "hidden", pointerEvents: "none",
        }}>
          <div style={{
            fontFamily: '"TASA Orbiter Display", "TASA Orbiter", "Inter", system-ui, sans-serif',
            fontWeight: 400,
            fontSize,
            lineHeight: 1.2,
            letterSpacing,
            color: "#686868",
            wordBreak: "break-word",
          }}>
            {cavity.founderName && cavity.company ? (
              <>
                <span style={{ color: "#ffffff" }}>{cavity.founderName}</span>
                {" broke this brick, to build "}
                <span style={{ color: "#ffffff" }}>{cavity.company}</span>
              </>
            ) : (
              cavity.text
            )}
          </div>
        </div>
      );
    }


    function Field({ label, value, onChange, multiline, maxLength, placeholder }) {
      const baseStyle = {
        width: "100%", padding: "9px 11px",
        background: "#0c0805", border: "1px solid #3a2818",
        borderRadius: 3, color: "#e8d4ba",
        fontFamily: "inherit", fontSize: 14,
        boxSizing: "border-box", outline: "none",
      };
      return (
        <label style={{ display: "block", marginBottom: 12 }}>
          <span style={{
            display: "block", fontSize: 10, letterSpacing: 1.4,
            textTransform: "uppercase", color: "#a07050",
            marginBottom: 5, fontFamily: '"TASA Orbiter", "Inter", system-ui, sans-serif',
          }}>{label}</span>
          {multiline
            ? <textarea value={value} maxLength={maxLength} placeholder={placeholder}
              onChange={(e) => onChange(e.target.value)}
              rows={2} style={{ ...baseStyle, resize: "none" }} />
            : <input type="text" value={value} placeholder={placeholder}
              onChange={(e) => onChange(e.target.value)} style={baseStyle} />}
        </label>
      );
    }

    // ============================================================
    // === 3D Brick Explosion =====================================
    // ============================================================
    // Cache the loaded GLB at module scope so re-explosions reuse the parsed
    // geometry instead of re-fetching/re-parsing (HTTP cache helps too, but
    // re-parsing GLTF is the slow part).
    let __brickGlbPromise = null;
    function loadBrickGlb() {
      if (!window.THREE || !window.THREE.GLTFLoader) {
        return Promise.reject(new Error("Three.js / GLTFLoader not available"));
      }
      if (__brickGlbPromise) return __brickGlbPromise;
      window.THREE.Cache.enabled = true;
      const loader = new window.THREE.GLTFLoader();
      __brickGlbPromise = new Promise((resolve, reject) => {
        loader.load("./Brick.glb", resolve, undefined, reject);
      });
      // Reset cache on failure so the next attempt can retry.
      __brickGlbPromise.catch(() => { __brickGlbPromise = null; });
      return __brickGlbPromise;
    }

    // Find the first mesh in a loaded GLB scene graph.
    function findFirstMesh(object) {
      let result = null;
      object.traverse((c) => { if (!result && c.isMesh) result = c; });
      return result;
    }

    // Auto-orient a brick geometry so the smallest dim is Z (depth into screen)
    // and the largest is X (width). Different GLB exporters default to different
    // up-axes (Blender Z-up, glTF Y-up); this normalizes any of them. Returns
    // the new bbox-size vector after rotation.
    function orientBrickGeometry(geom) {
      const THREE = window.THREE;
      geom.computeBoundingBox();
      let s = geom.boundingBox.getSize(new THREE.Vector3());
      // Pass 1: smallest dim -> Z. Rotating around Y swaps X↔Z; around X swaps Y↔Z.
      if (s.x < s.y && s.x < s.z) {
        geom.rotateY(Math.PI / 2);
      } else if (s.y < s.x && s.y < s.z) {
        geom.rotateX(Math.PI / 2);
      }
      geom.computeBoundingBox();
      s = geom.boundingBox.getSize(new THREE.Vector3());
      // Pass 2: brick should be wider than tall. If not, rotate around Z.
      if (s.x < s.y) {
        geom.rotateZ(Math.PI / 2);
        geom.computeBoundingBox();
        s = geom.boundingBox.getSize(new THREE.Vector3());
      }
      return s;
    }

    // Split a mesh's geometry into spatial chunks so the explosion shows
    // chunky shards (not individual triangles). Z=1 keeps each chunk full-depth
    // so it reads as a 3D block instead of a thin sliver. Returns an array of
    // { mesh, velocity, angularVelocity, gravity } records ready to animate.
    function fragmentBrickMesh(geometry, sharedMaterial, scene, size, chunksX, chunksY, chunksZ) {
      const THREE = window.THREE;
      const positions = geometry.attributes.position;
      const uvs = geometry.attributes.uv;
      const normals = geometry.attributes.normal;

      let triangleCount, getIdx;
      if (geometry.index) {
        const idx = geometry.index;
        triangleCount = idx.count / 3;
        getIdx = (i) => idx.getX(i);
      } else {
        triangleCount = positions.count / 3;
        getIdx = (i) => i;
      }

      const cellW = size.x / chunksX;
      const cellH = size.y / chunksY;
      const cellD = size.z / Math.max(1, chunksZ);
      const halfX = size.x / 2, halfY = size.y / 2, halfZ = size.z / 2;
      const chunks = new Map();

      for (let t = 0; t < triangleCount; t++) {
        const a = getIdx(t * 3), b = getIdx(t * 3 + 1), c = getIdx(t * 3 + 2);
        const cx = (positions.getX(a) + positions.getX(b) + positions.getX(c)) / 3;
        const cy = (positions.getY(a) + positions.getY(b) + positions.getY(c)) / 3;
        const cz = (positions.getZ(a) + positions.getZ(b) + positions.getZ(c)) / 3;
        const ix = Math.min(chunksX - 1, Math.max(0, Math.floor((cx + halfX) / cellW)));
        const iy = Math.min(chunksY - 1, Math.max(0, Math.floor((cy + halfY) / cellH)));
        const iz = Math.min(chunksZ - 1, Math.max(0, Math.floor((cz + halfZ) / cellD)));
        const key = ix + "_" + iy + "_" + iz;
        if (!chunks.has(key)) chunks.set(key, []);
        chunks.get(key).push([a, b, c]);
      }

      const fragments = [];
      // Use the in-plane (X+Y) scale, not full 3D, so the explosion speed
      // reads correctly relative to the brick's visual footprint.
      const speedScale = (size.x + size.y) / 2;

      for (const tris of chunks.values()) {
        let cX = 0, cY = 0, cZ = 0;
        for (const [a, b, c] of tris) {
          cX += (positions.getX(a) + positions.getX(b) + positions.getX(c)) / 3;
          cY += (positions.getY(a) + positions.getY(b) + positions.getY(c)) / 3;
          cZ += (positions.getZ(a) + positions.getZ(b) + positions.getZ(c)) / 3;
        }
        cX /= tris.length; cY /= tris.length; cZ /= tris.length;

        // Recenter chunk vertices around the chunk centroid so spinning
        // happens around the chunk's own middle, not the brick origin.
        const posArr = [], uvArr = [], normArr = [];
        for (const [a, b, c] of tris) {
          for (const idx of [a, b, c]) {
            posArr.push(
              positions.getX(idx) - cX,
              positions.getY(idx) - cY,
              positions.getZ(idx) - cZ
            );
            if (uvs) uvArr.push(uvs.getX(idx), uvs.getY(idx));
            if (normals) normArr.push(normals.getX(idx), normals.getY(idx), normals.getZ(idx));
          }
        }
        const chunkGeom = new THREE.BufferGeometry();
        chunkGeom.setAttribute("position", new THREE.Float32BufferAttribute(posArr, 3));
        if (uvs) chunkGeom.setAttribute("uv", new THREE.Float32BufferAttribute(uvArr, 2));
        if (normals) chunkGeom.setAttribute("normal", new THREE.Float32BufferAttribute(normArr, 3));

        const chunkMesh = new THREE.Mesh(chunkGeom, sharedMaterial);
        chunkMesh.position.set(cX, cY, cZ);
        scene.add(chunkMesh);

        // In-plane (X+Y) outward velocity. Light Y dampening + upward boost
        // so shards arc up before falling, instead of immediately diving.
        // Z velocity is small — keeps shards mostly on screen.
        const inPlane = Math.sqrt(cX * cX + cY * cY) || 1;
        const speed = speedScale * (0.9 + Math.random() * 0.7);
        const velocity = new THREE.Vector3(
          (cX / inPlane) * speed + (Math.random() - 0.5) * speedScale * 0.25,
          (cY / inPlane) * speed * 0.55 + speedScale * (0.4 + Math.random() * 0.4),
          (cZ >= 0 ? 1 : -1) * speedScale * (0.3 + Math.random() * 0.5)
        );
        const angularVelocity = new THREE.Vector3(
          (Math.random() - 0.5) * 7,
          (Math.random() - 0.5) * 7,
          (Math.random() - 0.5) * 7
        );

        fragments.push({
          mesh: chunkMesh,
          velocity,
          angularVelocity,
          gravity: speedScale * 5.5,
        });
      }
      return fragments;
    }

    // Aligns a 3D shatter to the focal brick's screen-space rect. Loads
    // Brick.glb, fragments the geometry, animates fragments outward + falling,
    // then calls onComplete. Falls back to onComplete on any failure.
    function BrickExplosion3D({ brickX, brickY, brickWidth, brickHeight, onComplete }) {
      const containerRef = useRef(null);
      const onCompleteRef = useRef(onComplete);
      onCompleteRef.current = onComplete;

      // Canvas spans larger than the brick so fragments aren't immediately
      // clipped on the way out. Asymmetric vertical room because gravity pulls
      // the bottom shards further down than the top ones rise.
      const padX = brickWidth * 0.6;
      const padTop = brickHeight * 1.6;
      const padBottom = brickHeight * 3.4;
      const canvasW = brickWidth + padX * 2;
      const canvasH = brickHeight + padTop + padBottom;
      const canvasX = brickX - padX;
      const canvasY = brickY - padTop;

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const THREE = window.THREE;
        if (!THREE || !THREE.GLTFLoader) {
          // Three.js never finished loading — fail forward so the cavity is still committed.
          const t = window.setTimeout(() => onCompleteRef.current && onCompleteRef.current(), 200);
          return () => window.clearTimeout(t);
        }

        let cancelled = false;
        let frameId = 0;
        let renderer = null;
        let fragments = [];
        let sharedMaterial = null;
        let onCompleteFired = false;
        const fireComplete = () => {
          if (onCompleteFired) return;
          onCompleteFired = true;
          if (onCompleteRef.current) onCompleteRef.current();
        };

        try {
          renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        } catch (e) {
          // No WebGL context available.
          const t = window.setTimeout(fireComplete, 200);
          return () => window.clearTimeout(t);
        }
        renderer.setSize(canvasW, canvasH);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        // Heavy ambient + soft directional. The PNG focal brick reads as a
        // mostly-flat texture, so we bias toward ambient to avoid a sudden
        // "everything got darker" feeling on swap. Directional just gives
        // tumbling shards a hint of shading variation.
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(-0.8, 1.2, 2);
        scene.add(dirLight);

        // Orthographic camera — keeps the brick proportions identical to the
        // 2D PNG so the swap from PNG → 3D is visually seamless.
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
        camera.position.set(0, 0, 5);

        let startTime = 0;
        let lastFrameTime = 0;
        const STATIC_MS = 130;       // hold the intact brick before exploding
        const TOTAL_MS = 1900;       // total animation duration
        const FADE_START_MS = 1300;  // start fading out at this point

        loadBrickGlb()
          .then((gltf) => {
            if (cancelled) return;
            const brickMesh = findFirstMesh(gltf.scene);
            if (!brickMesh) { fireComplete(); return; }

            // Bake world transforms into the geometry, recenter on origin so
            // radial-explosion math works, then auto-orient.
            gltf.scene.updateMatrixWorld(true);
            const geom = brickMesh.geometry.clone();
            geom.applyMatrix4(brickMesh.matrixWorld);
            geom.computeBoundingBox();
            const center = geom.boundingBox.getCenter(new THREE.Vector3());
            geom.translate(-center.x, -center.y, -center.z);
            let size = orientBrickGeometry(geom);

            // Non-uniform scale to force the GLB's X/Y aspect to match the
            // focal brick's rect EXACTLY. Without this, a GLB whose intrinsic
            // aspect differs from the PNG's will render at the wrong height
            // — which is what made the swap look broken.
            const targetAspect = brickWidth / brickHeight;
            const currentAspect = size.x / size.y;
            if (Math.abs(currentAspect - targetAspect) > 0.02) {
              const scaleY = currentAspect / targetAspect;
              geom.scale(1, scaleY, 1);
              geom.computeBoundingBox();
              size = geom.boundingBox.getSize(new THREE.Vector3());
            }

            // Camera ortho frustum: solve so brick3D.width spans exactly
            // `brickWidth` pixels of the canvas, and the brick's center sits
            // at the focal-brick rect's center within the canvas (NOT the
            // canvas center — vertical padding is asymmetric to give shards
            // room to fall under gravity).
            //
            // Derivation: in Three.js ortho, world Y=0 renders at
            //   canvasY = camera.top / orthoH × canvasH
            // so camera.top = (brickCenterY_inCanvas / canvasH) × orthoH.
            // Earlier code had this with the wrong sign, which placed the 3D
            // brick BELOW the focal-brick rect instead of on top of it.
            const orthoW = size.x * (canvasW / brickWidth);
            const orthoH = orthoW * (canvasH / canvasW);
            const brickCenterY_inCanvas = padTop + brickHeight / 2;
            camera.left = -orthoW / 2;
            camera.right = orthoW / 2;
            camera.top = (brickCenterY_inCanvas / canvasH) * orthoH;
            camera.bottom = camera.top - orthoH;
            camera.updateProjectionMatrix();

            // Share one material across all fragments — opacity fade is a
            // single property write instead of N writes per frame. Cloning
            // shares the texture references so disposal here doesn't break
            // the cached GLB.
            sharedMaterial = brickMesh.material.clone();
            sharedMaterial.transparent = true;
            sharedMaterial.side = THREE.DoubleSide;
            sharedMaterial.depthWrite = true;

            // 5 × 3 × 1 = 15 chunky slabs. Z=1 means each chunk has full
            // brick depth — reads as a 3D block instead of a thin sliver as
            // it tumbles.
            fragments = fragmentBrickMesh(geom, sharedMaterial, scene, size, 5, 3, 1);

            // Render the static brick once so the "intact 3D brick" frame
            // shows up before motion begins — masks the PNG → 3D swap.
            renderer.render(scene, camera);

            startTime = performance.now();
            lastFrameTime = startTime;
            frameId = requestAnimationFrame(animate);
          })
          .catch((err) => {
            console.warn("Brick.glb load failed", err);
            fireComplete();
          });

        function animate() {
          if (cancelled) return;
          const now = performance.now();
          const elapsed = now - startTime;
          // Real frame delta, capped to avoid huge jumps if a frame stalls
          // (tab switch, GC pause, etc.) — clipping at ~30fps minimum.
          const dt = Math.min(0.033, (now - lastFrameTime) / 1000);
          lastFrameTime = now;

          // Static phase: hold the intact 3D brick still for a few frames so
          // the PNG → 3D handoff doesn't visually jump. Then start motion.
          if (elapsed > STATIC_MS) {
            for (const f of fragments) {
              f.mesh.position.x += f.velocity.x * dt;
              f.mesh.position.y += f.velocity.y * dt;
              f.mesh.position.z += f.velocity.z * dt;
              f.velocity.y -= f.gravity * dt;
              f.mesh.rotation.x += f.angularVelocity.x * dt;
              f.mesh.rotation.y += f.angularVelocity.y * dt;
              f.mesh.rotation.z += f.angularVelocity.z * dt;
            }
          }

          if (sharedMaterial && elapsed > FADE_START_MS) {
            const t = Math.min(1, (elapsed - FADE_START_MS) / (TOTAL_MS - FADE_START_MS));
            sharedMaterial.opacity = 1 - t;
          }

          renderer.render(scene, camera);

          if (elapsed < TOTAL_MS) {
            frameId = requestAnimationFrame(animate);
          } else {
            fireComplete();
          }
        }

        return () => {
          cancelled = true;
          if (frameId) cancelAnimationFrame(frameId);
          // Dispose every chunk geometry — these were freshly allocated.
          for (const f of fragments) {
            if (f.mesh.geometry) f.mesh.geometry.dispose();
          }
          // Dispose the cloned material (textures stay alive via the cached GLB).
          if (sharedMaterial) sharedMaterial.dispose();
          if (renderer) {
            renderer.dispose();
            // Browsers cap concurrent WebGL contexts (~8-16). Explicitly
            // releasing the context here means repeated explosions don't
            // hit that ceiling.
            try { renderer.forceContextLoss(); } catch (e) { }
            if (renderer.domElement && renderer.domElement.parentNode) {
              renderer.domElement.parentNode.removeChild(renderer.domElement);
            }
          }
        };
      }, [brickX, brickY, brickWidth, brickHeight, canvasW, canvasH, canvasX, canvasY]);

      return (
        <div
          ref={containerRef}
          style={{
            position: "absolute",
            left: canvasX, top: canvasY,
            width: canvasW, height: canvasH,
            pointerEvents: "none",
            zIndex: 75,
          }}
        />
      );
    }

    function FoundersWall({
      brickImage = "Brick_alpha.png",
      wallColumns = 400,
      wallRows = 200,
      brickWidth = DEFAULT_BRICK_W,
      brickHeight = DEFAULT_BRICK_H,
      mortarColor = "#1a120c",
      wallBackgroundColor = "#020202",
      enableShatter = true,
      style,
    }: Partial<FoundersWallProps>) {
      const containerRef = useRef(null);
      const innerRef = useRef(null);
      const dragRef = useRef(null);
      const panRef = useRef({ x: 0, y: 0 });
      const initializedRef = useRef(false);

      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [viewport, setViewport] = useState({ w: 0, h: 0 });
      const [hovered, setHovered] = useState(null);
      const [userCavities, setUserCavities] = useState([]);
      const [selectedBrick, setSelectedBrick] = useState(null);
      const [shatter, setShatter] = useState(null);
      const [shaking, setShaking] = useState(false);

      const isTouch = useMemo(() => isTouchEnv(), []);
      const prefersReducedMotion = useReducedMotion();
      const wallPxWidth = wallColumns * brickWidth;
      const wallPxHeight = wallRows * brickHeight;
      const brickImageSrc = brickImage && brickImage.length > 0 ? brickImage : "Brick_alpha.png";

      useLayoutEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const update = () => {
          const r = el.getBoundingClientRect();
          setViewport({ w: r.width, h: r.height });
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        if (initializedRef.current) return;
        if (viewport.w === 0 || viewport.h === 0) return;
        // Land in the middle of the wall.
        const cx = (wallColumns / 2) * brickWidth;
        const cy = (wallRows / 2) * brickHeight;
        const rawX = viewport.w / 2 - cx;
        const rawY = viewport.h / 2 - cy;
        const minX = Math.min(0, viewport.w - wallPxWidth);
        const minY = Math.min(0, viewport.h - wallPxHeight);
        const x = clampN(rawX, minX, 0);
        const y = clampN(rawY, minY, 0);
        panRef.current = { x, y };
        setPan({ x, y });
        initializedRef.current = true;
      }, [viewport.w, viewport.h, brickWidth, brickHeight, wallPxWidth, wallPxHeight, wallColumns, wallRows]);

      // Viewport-bounded cavity rendering (camera clipping). Cavities outside
      // the visible+overscan range are never generated, allocated, or compared.
      const overscan = 12;
      const visStartCol = Math.max(0, Math.floor(-pan.x / brickWidth) - overscan);
      const visEndCol = Math.min(wallColumns - 1, Math.ceil((-pan.x + viewport.w) / brickWidth) + overscan);
      const visStartRow = Math.max(0, Math.floor(-pan.y / brickHeight) - overscan);
      const visEndRow = Math.min(wallRows - 1, Math.ceil((-pan.y + viewport.h) / brickHeight) + overscan);

      const userCavityMap = useMemo(() => {
        const m = new Map();
        for (const cv of userCavities) m.set(`${cv.col}_${cv.row}`, cv);
        return m;
      }, [userCavities]);

      const visibleCavities = useMemo(() => {
        const out = [];
        for (let r = visStartRow; r <= visEndRow; r++) {
          for (let c = visStartCol; c <= visEndCol; c++) {
            const userCav = userCavityMap.get(`${c}_${r}`);
            if (userCav) { out.push(userCav); continue; }
            const presetCav = computePresetCavity(c, r);
            if (presetCav) out.push(presetCav);
          }
        }
        return out;
      }, [visStartCol, visEndCol, visStartRow, visEndRow, userCavityMap]);

      const occupied = useMemo(() => {
        const s = new Set();
        for (const cv of visibleCavities) {
          for (let dc = 0; dc < CAVITY_W_BRICKS; dc++)
            for (let dr = 0; dr < CAVITY_H_BRICKS; dr++)
              s.add(`${cv.col + dc}_${cv.row + dr}`);
        }
        return s;
      }, [visibleCavities]);

      const visibleBricks = [];
      for (let r = visStartRow; r <= visEndRow; r++) {
        for (let c = visStartCol; c <= visEndCol; c++) {
          if (occupied.has(`${c}_${r}`)) continue;
          visibleBricks.push({ col: c, row: r });
        }
      }

      const brickAtScreen = useCallback((clientX, clientY) => {
        const rect = containerRef.current?.getBoundingClientRect();
        if (!rect) return null;
        const px = clientX - rect.left - panRef.current.x;
        const py = clientY - rect.top - panRef.current.y;
        const r = Math.floor(py / brickHeight);
        const offsetX = brickScreenOffset(r, brickWidth);
        const c = Math.floor((px - offsetX) / brickWidth);
        if (c < 0 || c >= wallColumns || r < 0 || r >= wallRows) return null;
        return { col: c, row: r };
      }, [brickWidth, brickHeight, wallColumns, wallRows]);

      const applyPan = useCallback((newX, newY) => {
        const minX = Math.min(0, viewport.w - wallPxWidth);
        const minY = Math.min(0, viewport.h - wallPxHeight);
        const x = clampN(newX, minX, 0);
        const y = clampN(newY, minY, 0);
        panRef.current = { x, y };
        if (innerRef.current) {
          innerRef.current.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        }
        const oldStartCol = Math.floor(-pan.x / brickWidth);
        const oldStartRow = Math.floor(-pan.y / brickHeight);
        const newStartCol = Math.floor(-x / brickWidth);
        const newStartRow = Math.floor(-y / brickHeight);
        if (oldStartCol !== newStartCol || oldStartRow !== newStartRow) {
          setPan({ x, y });
        }
      }, [viewport.w, viewport.h, wallPxWidth, wallPxHeight, brickWidth, brickHeight, pan.x, pan.y]);

      const onPointerDown = useCallback((e) => {
        if (selectedBrick) return;
        const target = e.target;
        if (target.closest && target.closest("[data-modal]")) return;
        dragRef.current = {
          active: true,
          startX: e.clientX, startY: e.clientY,
          panX: panRef.current.x, panY: panRef.current.y,
          moved: false, pointerId: e.pointerId,
        };
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch { }
      }, [selectedBrick]);

      const onPointerMove = useCallback((e) => {
        if (selectedBrick) return;
        const d = dragRef.current;
        if (d && d.active) {
          const dx = e.clientX - d.startX;
          const dy = e.clientY - d.startY;
          if (Math.abs(dx) + Math.abs(dy) > 4) d.moved = true;
          applyPan(d.panX + dx, d.panY + dy);
          if (hovered) setHovered(null);
          return;
        }
        if (isTouch) return;
        const hit = brickAtScreen(e.clientX, e.clientY);
        if (!hit) { if (hovered) setHovered(null); return; }
        if (occupied.has(`${hit.col}_${hit.row}`)) {
          if (hovered) setHovered(null);
          return;
        }
        if (hovered && hovered.col === hit.col && hovered.row === hit.row) return;
        setHovered({ col: hit.col, row: hit.row });
      }, [selectedBrick, applyPan, hovered, isTouch, brickAtScreen, occupied]);

      const finishPointer = useCallback((e) => {
        const d = dragRef.current;
        if (!d) return;
        dragRef.current = null;
        try { e.currentTarget.releasePointerCapture(d.pointerId); } catch { }
        if (d.moved) { setPan({ ...panRef.current }); return; }
        const hit = brickAtScreen(e.clientX, e.clientY);
        if (!hit) return;
        const hitKey = `${hit.col}_${hit.row}`;
        const inCavity = userCavityMap.has(hitKey) || !!computePresetCavity(hit.col, hit.row);
        if (inCavity) return;
        const screenX = panRef.current.x + hit.col * brickWidth + brickScreenOffset(hit.row, brickWidth);
        const screenY = panRef.current.y + hit.row * brickHeight;
        setSelectedBrick({ col: hit.col, row: hit.row, screenX, screenY });
        setHovered(null);
      }, [brickAtScreen, userCavityMap, brickWidth]);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const onWheel = (e) => {
          if (selectedBrick) return;
          e.preventDefault();
          applyPan(panRef.current.x - e.deltaX, panRef.current.y - e.deltaY);
        };
        el.addEventListener("wheel", onWheel, { passive: false });
        return () => el.removeEventListener("wheel", onWheel);
      }, [selectedBrick, applyPan]);

      // Bottom-left CTA click — picks the nearest unbroken brick to the
      // viewport center and opens the break-brick flow on it.
      const onCtaClick = useCallback(() => {
        if (selectedBrick || shatter) return;
        const centerWallX = -panRef.current.x + viewport.w / 2;
        const centerWallY = -panRef.current.y + viewport.h / 2;
        const startCol = Math.floor(centerWallX / brickWidth);
        const startRow = Math.floor(centerWallY / brickHeight);
        for (let dist = 0; dist < 20; dist++) {
          for (let dr = -dist; dr <= dist; dr++) {
            for (let dc = -dist; dc <= dist; dc++) {
              if (Math.max(Math.abs(dr), Math.abs(dc)) !== dist) continue;
              const c = startCol + dc;
              const r = startRow + dr;
              if (c < 0 || c >= wallColumns || r < 0 || r >= wallRows) continue;
              if (userCavityMap.has(`${c}_${r}`)) continue;
              if (computePresetCavity(c, r)) continue;
              const screenX =
                panRef.current.x + c * brickWidth + brickScreenOffset(r, brickWidth);
              const screenY = panRef.current.y + r * brickHeight;
              setSelectedBrick({ col: c, row: r, screenX, screenY });
              setHovered(null);
              return;
            }
          }
        }
      }, [viewport.w, viewport.h, brickWidth, brickHeight, wallColumns, wallRows, userCavityMap, selectedBrick, shatter]);

      const handleBreakBrick = useCallback((odds, name, linkedin, company) => {
        if (!selectedBrick) return;
        const newCavity = {
          col: selectedBrick.col, row: selectedBrick.row,
          text: odds,
          founderName: name || undefined,
          company: company || undefined,
          linkedin: linkedin || undefined,
          isUserBrick: true,
        };
        if (enableShatter && !prefersReducedMotion) {
          // Use the EXACT focal-brick rect so the 3D explosion lands pixel-
          // aligned on top of the PNG focal brick — no visual jump on swap.
          // BrickExplosion3D pads its own canvas around this rect so shards
          // have room to fly outward.
          const isMobile = viewport.w < 768;
          const focalW = isMobile
            ? Math.min(viewport.w - 64, brickWidth * 2.4)
            : Math.min(viewport.w * 0.7, 1100);
          const focalH = focalW / (brickWidth / brickHeight);
          const focalCenterX = viewport.w / 2;
          const focalCenterY = isMobile ? viewport.h * 0.22 : viewport.h * 0.32;
          setShatter({
            brickX: focalCenterX - focalW / 2,
            brickY: focalCenterY - focalH / 2,
            brickWidth: focalW,
            brickHeight: focalH,
            cavity: newCavity,
          });
          setShaking(true);
          window.setTimeout(() => setShaking(false), 280);
          // Safety fallback if the GLB load / WebGL init fails — still commit
          // the cavity so the user isn't stranded.
          window.setTimeout(() => {
            setShatter((s) => {
              if (!s) return null;
              setUserCavities((prev) => [...prev, s.cavity]);
              setSelectedBrick(null);
              return null;
            });
          }, 4000);
        } else {
          window.setTimeout(() => {
            setUserCavities((prev) => [...prev, newCavity]);
            setSelectedBrick(null);
          }, 400);
        }
      }, [selectedBrick, enableShatter, prefersReducedMotion, viewport.w, viewport.h, brickWidth, brickHeight]);

      const cursor = selectedBrick ? "default" : (dragRef.current?.active ? "grabbing" : "grab");

      return (
        <div
          ref={containerRef}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={finishPointer}
          onPointerCancel={finishPointer}
          onPointerLeave={() => { if (!dragRef.current?.active) setHovered(null); }}
          style={{
            position: "relative", width: "100%", height: "100%", overflow: "hidden",
            background: wallBackgroundColor, cursor, touchAction: "none", userSelect: "none",
            ...style,
          }}
        >
          <div style={{
            position: "absolute", inset: 0,
            background: `radial-gradient(ellipse at 50% 50%, ${mortarColor} 0%, ${wallBackgroundColor} 90%)`,
            pointerEvents: "none",
          }} />

          {/* Top fade — #1E1E1E at the very top, transparent toward middle */}
          <div style={{
            position: "absolute",
            top: 0, left: 0, right: 0,
            height: "32%",
            background: "linear-gradient(to bottom, rgba(30,30,30,1) 0%, rgba(30,30,30,0.85) 25%, rgba(30,30,30,0.55) 55%, rgba(30,30,30,0) 100%)",
            pointerEvents: "none",
            zIndex: 25,
          }} />

          {/* Bottom fade — #1E1E1E at the very bottom, transparent toward middle */}
          <div style={{
            position: "absolute",
            bottom: 0, left: 0, right: 0,
            height: "32%",
            background: "linear-gradient(to top, rgba(30,30,30,1) 0%, rgba(30,30,30,0.85) 25%, rgba(30,30,30,0.55) 55%, rgba(30,30,30,0) 100%)",
            pointerEvents: "none",
            zIndex: 25,
          }} />

          <motion.div
            animate={shaking
              ? { x: [0, -6, 6, -4, 4, -2, 0], y: [0, 3, -3, 2, -2, 1, 0] }
              : { x: 0, y: 0 }}
            transition={shaking ? { duration: 0.26, ease: "easeOut" } : { duration: 0 }}
            style={{ position: "absolute", inset: 0 }}
          >
            <div ref={innerRef} style={{
              position: "absolute", left: 0, top: 0,
              width: wallPxWidth, height: wallPxHeight,
              transform: `translate3d(${pan.x}px, ${pan.y}px, 0)`,
              willChange: "transform",
            }}>
              {visibleBricks.map(({ col, row }) => {
                if (selectedBrick && selectedBrick.col === col && selectedBrick.row === row) return null;
                const isHovered =
                  !!hovered && !isTouch && !selectedBrick &&
                  hovered.col === col && hovered.row === row;
                return (
                  <Brick key={`${col}_${row}`}
                    col={col} row={row}
                    brickWidth={brickWidth} brickHeight={brickHeight}
                    brickImage={brickImageSrc} mortarColor={mortarColor}
                    hovered={isHovered}
                  />
                );
              })}
              {visibleCavities.map((cv) => (
                <CavityView key={`cav_${cv.col}_${cv.row}_${cv.isUserBrick ? "u" : "p"}`}
                  cavity={cv} brickWidth={brickWidth} brickHeight={brickHeight}
                />
              ))}
            </div>
          </motion.div>

          {/* Top-left: Razorpay logo + title + subtitle (sizing from Figma) */}
          <header style={{
            position: "absolute",
            top: 33, left: 42,
            display: "flex", alignItems: "baseline", gap: 26,
            zIndex: 30,
            pointerEvents: "none",
            userSelect: "none",
          }}>
            <img
              src="./RazorpayFullLogo.svg"
              alt="Razorpay"
              style={{ height: 37.5, width: "auto", display: "block", alignSelf: "center" }}
            />
            <span style={{
              fontFamily: '"TASA Orbiter", "Inter", system-ui, sans-serif',
              fontSize: 41.16,
              fontWeight: 400,
              color: "#ffffff",
              letterSpacing: -0.82,
              lineHeight: "32.93px",
              whiteSpace: "nowrap",
            }}>
              Wall of Impossible Odds.
            </span>
          </header>

          {/* Bottom-left: CTA card (sizing & rounded background from Figma 834:185).
              Height is intentionally auto — the subtitle is two lines, and locking
              a fixed height made `"story."` dangle below the box. */}
          <div
            onPointerDown={(e) => e.stopPropagation()}
            onClick={onCtaClick}
            style={{
              position: "absolute",
              bottom: 32, left: 32,
              width: 383,
              padding: "24px 25px 26px 25px",
              boxSizing: "border-box",
              background: "rgba(3,3,3,0.6)",
              borderRadius: 14.6,
              backdropFilter: "blur(2px)",
              WebkitBackdropFilter: "blur(2px)",
              zIndex: 30,
              cursor: "pointer",
              userSelect: "none",
              pointerEvents: selectedBrick || shatter ? "none" : "auto",
            }}
          >
            <div style={{
              fontFamily: '"TASA Orbiter", "Inter", system-ui, sans-serif',
              fontSize: 31.2,
              fontWeight: 400,
              color: "#ffffff",
              letterSpacing: -1.87,
              // Line-height was 24.94 (smaller than font size) — clipped descenders
              // like the y in "your" / "brick". 1.05 keeps the title compact while
              // giving the y-tail enough room.
              lineHeight: 1.05,
              display: "flex",
              alignItems: "center",
              gap: 6,
            }}>
              <span>Break your brick.</span>
              <span style={{
                fontSize: 22,
                lineHeight: 1,
                transform: "translateY(-2px)",
                color: "#ffffff",
              }}>↗</span>
            </div>
            <div style={{
              fontFamily: '"TASA Orbiter", "Inter", system-ui, sans-serif',
              fontSize: 18,
              fontWeight: 400,
              color: "#9a9a9a",
              marginTop: 12,
              letterSpacing: -0.54,
              lineHeight: 1.35,
            }}>
              {/* Explicit line break at the question mark — keeps both lines balanced
                  ("Beaten your odds and built?" / "Share your story.") instead of
                  letting `"story."` orphan to its own line. */}
              Beaten your odds and built?<br />
              Share your story.
            </div>
          </div>

          <AnimatePresence>
            {(selectedBrick || shatter) && (
              <motion.div key="dim"
                initial={{ opacity: 0 }} animate={{ opacity: 0.7 }} exit={{ opacity: 0 }}
                transition={{ duration: 0.3 }}
                style={{ position: "absolute", inset: 0, background: "#000", zIndex: 50, pointerEvents: "auto" }}
              />
            )}
          </AnimatePresence>

          <AnimatePresence>
            {selectedBrick && !shatter && (
              <BreakBrickModal key="modal"
                selected={selectedBrick}
                brickWidth={brickWidth} brickHeight={brickHeight}
                brickImage={brickImageSrc}
                viewportW={viewport.w} viewportH={viewport.h}
                onCancel={() => setSelectedBrick(null)}
                onBreak={handleBreakBrick}
              />
            )}
          </AnimatePresence>

          <AnimatePresence>
            {shatter && (
              <BrickExplosion3D key="brick-explosion-3d"
                brickX={shatter.brickX} brickY={shatter.brickY}
                brickWidth={shatter.brickWidth} brickHeight={shatter.brickHeight}
                onComplete={() => {
                  setShatter((s) => {
                    if (!s) return null;
                    setUserCavities((prev) => [...prev, s.cavity]);
                    setSelectedBrick(null);
                    return null;
                  });
                }}
              />
            )}
          </AnimatePresence>
        </div>
      );
    }

    // ============================================================
    // === END component ==========================================
    // ============================================================

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <FoundersWall brickImage="Brick_alpha.png" />
    );
  </script>
</body>

</html>
