<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <title>Founder's Brick Generator — Iteration Viewer</title>

  <!--
  =======================================================================
  Founder's Brick Generator — local iteration viewer
  =======================================================================

  Thin standalone clone of FoundersBrickGenerator.tsx (the Framer code
  component). Exists so we can iterate on the render pipeline in a
  normal browser, then promote final state back to the .tsx for shipping.

  KEEP IN SYNC with FoundersBrickGenerator.tsx:
    - R2_BASE
    - FINAL_VIDEO_PATHS
    - SLAB_CONFIG
    - POSTER_OVERLAY
    - All helpers in SECTION 2 / 3 (slab + poster rendering)

  Workflow:
    1. Iterate visuals/config in this file.
    2. When happy, copy SLAB_CONFIG / POSTER_OVERLAY / any helper
       changes into the .tsx — same constants, same code.
  =======================================================================
-->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Special+Gothic+Condensed+One&family=Unbounded:wght@400;700;900&display=swap">

  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --panel: #141414;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e7e3e3;
      --subtle: #888;
      --accent: #0039ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar form ──────────────────────────────────────────────── */
    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    aside h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    aside h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--subtle);
      margin: 12px 0 4px;
    }

    aside label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--subtle);
    }

    aside input,
    aside select,
    aside textarea {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }

    aside input:focus,
    aside select:focus,
    aside textarea:focus {
      border-color: var(--accent);
    }

    aside textarea {
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    aside .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    aside button {
      background: var(--accent);
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    aside button:hover {
      opacity: 0.9;
    }

    aside button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    aside .secondary {
      background: transparent;
      border: 1px solid var(--border);
    }

    aside .meta {
      font-size: 11px;
      color: var(--subtle);
      line-height: 1.5;
    }

    /* ── Viewer ────────────────────────────────────────────────────── */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    #viewport {
      width: min(540px, 100%);
      aspect-ratio: 1080 / 1350;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #viewport canvas,
    #viewport video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #status {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <aside>
    <h1>Founder's Brick Generator</h1>
    <div class="meta">Iteration viewer for FoundersBrickGenerator.tsx. Changes here get promoted back to the .tsx.</div>

    <h2>Inputs</h2>
    <label>Name
      <input id="f-name" type="text" value="Matt Chithranjan" placeholder="Their name" />
    </label>
    <label>Company
      <input id="f-company" type="text" value="Blue Tokai" placeholder="Their company" />
    </label>
    <label>Odds Beaten
      <textarea id="f-odds" placeholder="Their odds">YOU DON'T HAVE A DEGREE</textarea>
    </label>

    <h2>Avatar &amp; Weapon</h2>
    <div class="row">
      <label>Avatar
        <select id="f-avatar">
          <option value="male" selected>Male</option>
          <option value="female">Female</option>
        </select>
      </label>
      <label>Weapon
        <select id="f-weapon">
          <option value="punch" selected>Punch</option>
          <option value="smash">Smash</option>
          <option value="crush">Crush</option>
          <option value="slice">Slice</option>
          <option value="thrash">Thrash</option>
          <option value="kick">Kick</option>
        </select>
      </label>
    </div>

    <h2>Actions</h2>
    <button id="btn-generate">Generate</button>
    <button id="btn-preview-frame" class="secondary">Preview first frame</button>
    <button id="btn-download" class="secondary" disabled>Download</button>

    <h2>State</h2>
    <div id="state-readout" class="meta">idle</div>
  </aside>

  <main>
    <div id="viewport">
      <canvas id="preview-canvas" width="1080" height="1350"></canvas>
      <video id="result-video" autoplay loop muted playsinline style="display:none"></video>
      <div id="status" style="display:none">…</div>
    </div>
  </main>

  <script type="module">
    // ============================================================================
    //  SECTION 1 — Configuration  (mirror of FoundersBrickGenerator.tsx)
    // ============================================================================

    const R2_BASE = "https://pub-0f7799ae7afd4b0e8e0a1b925ad21000.r2.dev";

    const FINAL_WIDTH = 1080;
    const FINAL_HEIGHT = 1350;

    const AVATAR_CONFIG = {
      male: { label: "Male" },
      female: { label: "Female" },
    };

    const WEAPON_CONFIG = {
      smash: { label: "SMASH IT" },
      crush: { label: "CRUSH IT" },
      slice: { label: "SLICE IT" },
      thrash: { label: "THRASH IT" },
      kick: { label: "KICK IT" },
      punch: { label: "PUNCH IT" },
    };

    const FINAL_VIDEO_PATHS = {
      male: {
        smash: "bat_35.mp4",
        crush: "hammer_37.mp4",
        slice: "sword_34.mp4",
        thrash: "flail_45.mp4",
        kick: "kick_48.mp4",
        punch: "punch_70.mp4",
      },
      female: {
        smash: "bat_39.mp4",
        crush: "hammer_72.mp4",
        slice: "sword_36.mp4",
        thrash: "flail_38.mp4",
        kick: "kick_35.mp4",
        punch: "punch_59.mp4",
      },
    };

    function getComboConfig(avatar, weapon) {
      const av = String(avatar).toLowerCase();
      const wp = String(weapon).toLowerCase();
      const filename = FINAL_VIDEO_PATHS[av]?.[wp];
      if (!filename) throw new Error(`Unknown combo: ${avatar} ${weapon}`);
      const cutMatch = filename.match(/_(\d+)\.mp4$/);
      return {
        label: `${AVATAR_CONFIG[av].label} · ${WEAPON_CONFIG[wp].label}`,
        baseVideo: `${R2_BASE}/Avatars/${av}/Final/${filename}`,
        textCutFrame: cutMatch ? parseInt(cutMatch[1], 10) : 45,
        videoFps: 24,
      };
    }

    // Slab text engraving config — Figma node 2518:129. See the .tsx file for
    // the full doc-block; identical values here.
    //
    // ── Text-wrapping rules (knobs below) ────────────────────────────────
    //   RULE 1  font stays at `maxFontSize` UNLESS wrap > `maxLines`
    //           lines. Only then do we scale DOWN, never up.
    //   RULE 2  any word with ≥ `hyphenateMinLength` characters is split
    //           at the midpoint with a trailing "-" and forced onto the
    //           next line.
    //   RULE 3  input is hard-truncated to `maxInputChars` characters
    //           before the wrap algorithm sees it.
    //   RULE 4  per-line character cap. During greedy packing, if adding
    //           the next word would push the line past `maxCharsPerLine`
    //           characters (incl. the joining space), break BEFORE that
    //           word — i.e. shift it to the next line. Single tokens
    //           longer than the cap (e.g. a hyphenation fragment for a
    //           15+ char word) still get their own line and may overflow.
    //   RULE 5  short-line override. If the max-font wrap exceeds RULE 1's
    //           line cap BUT every line is shorter than
    //           `narrowLineThreshold` characters, KEEP max font anyway.
    //           Narrow-line wraps stay visually balanced even at 5+ lines
    //           because the text block stays slim — character density per
    //           line matters more than line count for legibility.
    //   RULE 6  deep-overflow floor. Fires in TWO independent ways:
    //           (a) post-fallback — after RULE 1's binary search bottoms
    //               out at `minFontSize`, if the wrap STILL exceeds
    //               `overflowLineThreshold` lines.
    //           (b) early — input text length > `overflowInputCharThreshold`
    //               (e.g. 29 or 30 chars). Bypasses RULES 1 + 5; long
    //               inputs always render at the smaller floor.
    //           Either way the chosen font is `overflowMinFontSize`,
    //           independent of `minFontSize` so typical wraps don't shrink.
    //
    // See `wrapAndFit` for the algorithm; see the slabText prep sites in
    // SECTION 5/6 for the input truncation.
    const SLAB_CONFIG = {
      textAnchor: { x: 0.4142, y: 0.6136 },
      textMaxWidth: 0.1824,
      textMaxHeight: 0.1563,

      // RULE 1 — font sizing bounds + the line-count threshold that
      // triggers scale-down.
      maxFontSize: 70,
      minFontSize: 58,
      maxLines: 4,

      // RULE 2 — hyphenate words this long or longer.
      hyphenateMinLength: 8,

      // RULE 3 — hard cap on user-supplied text length.
      maxInputChars: 30,

      // RULE 4 — per-line character budget (incl. spaces).
      maxCharsPerLine: 8,

      // RULE 5 — short-line override.
      narrowLineThreshold: 7,

      // RULE 6 — deep-overflow floor.
      overflowLineThreshold: 5,
      overflowMinFontSize: 52,
      overflowInputCharThreshold: 28,

      fontFamily: "'Special Gothic Condensed One', 'Anton', sans-serif",
      fontWeight: 400,
      fontColor: "#3a3a3a",
      lineHeight: 0.8,
      letterSpacing: -0.02,
      textAlign: "left",
      compositeMode: "overlay",
      opacity: 0.8,
      noise: { enabled: true, density: 0.55, intensity: 0.55 },
      innerShadow: { enabled: true, offsetX: 4, offsetY: 4, blur: 9, color: "rgba(0,0,0,0.95)" },
      skewX: 8,
      skewY: 0,
      rotation: -2.53,
      clipPolygon: [
        [0.2976, 0.5184],
        [0.5226, 0.5184],
        [0.5226, 0.7087],
        [0.2976, 0.7087],
      ],
    };

    // Poster overlay config — Figma frames 4313:10 (2-line name) + 4313:95
    // (1-line name). 620×775 mock × (1080/620 ≈ 1.7419) → canvas coords.
    //
    // ── Title-stack layout (NEW: center-anchored) ────────────────────────
    // The title group (eyebrow + name + subtitle, with the gaps between
    // them) is treated as ONE block whose visual centre lives at
    // `title.anchorY`. The block grows up AND down as the name wraps from
    // 1 line to 2 lines — so the whole group stays optically centred on
    // the anchor instead of pushing the subtitle downward when the name
    // gains a line.
    //
    // Eyebrow height uses `lineHeight` (Figma leading-[21.803px] →
    // 64.16 canvas px) — NOT fontSize. Inside that line box the glyphs
    // are vertically centred (textBaseline="middle" at lineBox/2).
    const POSTER_OVERLAY = {
      bg: "#010201",
      textColor: "#c4c4c4",
      accent: "#0039ff",

      razorpayLogo: {
        x: 50.51, y: 38.37, w: 224.92, h: 47.98,
        src: `${R2_BASE}/Avatars/Razorpay_Logo.png`,
      },
      campaignLogo: {
        x: 803.05, y: 24.39, w: 250.84, h: 66.58,
        src: `${R2_BASE}/Avatars/BreakToBuild_logo.png`,
      },
      tickerImage: { src: `${R2_BASE}/Avatars/Ticker_Blue.svg` },

      title: {
        centerX: 540,
        // Y centre of the WHOLE title group (eyebrow + name + subtitle).
        // ~80 figma units × 2.943 = 235 canvas px. Tuned so the 2-line
        // name case in Figma node 4313:10 matches its original top=27.19
        // figma units; the 1-line case auto-recenters around the same
        // anchor and lands slightly below Figma node 4313:95's top — a
        // single anchor inevitably picks one or the other; this anchor
        // favours the 2-line layout (the more constrained case).
        anchorY: 235,
        eyebrow: {
          text: "THANK YOU",
          fontFamily: "Unbounded",
          fontWeight: 400,
          fontSize: 32.729,
          // Figma leading-[21.803px] → 21.803 × 2.943 ≈ 64.16. This is
          // the line-box height for vertical layout; fontSize is the cap
          // height inside it. The glyphs render in the middle of the
          // line box (textBaseline="middle" at startY + lineHeight/2).
          lineHeight: 64.16,
          letterSpacing: -1.31,
        },
        // Vertical gap between bottom of eyebrow line-box and top of
        // name. Figma: 3.0 figma units × 2.943 ≈ 8.83 canvas px.
        eyebrowToNameGap: 9,
        name: {
          fontFamily: "Unbounded",
          fontWeight: 900,
          fontSize: 94.706,
          lineHeight: 92.424,
          letterSpacing: -3.79,
          maxWidth: 1020,
        },
        // Vertical gap between bottom of name (last name line) and top
        // of subtitle. Figma: ~7 figma units × 2.943 ≈ 20.6 canvas px;
        // averaged between the two design variants.
        nameToSubtitleGap: 22,
        subtitle: {
          prefix: "FOR BEATING THE ODDS AND BUILDING ",
          fontFamily: "Unbounded",
          fontWeight: 400,
          fontSize: 28.016,
          lineHeight: 38.1,
          letterSpacing: -1.12,
          maxWidth: 639,
        },
      },

      media: { x: 0, y: 0 },

      // Diagonal blue ticker strip — Figma frame 3865:248.
      // IMPORTANT: Ticker_Blue.svg is 1376×302 with the -9.12° rotation
      // BAKED INTO the file's internal <rect transform>. Treat as a flat
      // image: do NOT apply canvas rotation; position by top-left at the
      // Figma container's CSS position; preserve the file's natural
      // aspect ratio so the text isn't squished.
      ticker: {
        x: -384.96, // -221 × 1.7419
        y: 1038.2,  //  596 × 1.7419
        w: 1966.44, // 1128.895 × 1.7419
      },
    };

    // ============================================================================
    //  SECTION 2 — Helpers
    // ============================================================================

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Failed to load image: " + src));
        img.src = src;
      });
    }

    async function loadComboVideo(avatar, weapon) {
      const cfg = getComboConfig(avatar, weapon);
      const video = document.createElement("video");
      video.src = cfg.baseVideo;
      video.crossOrigin = "anonymous";
      video.muted = true;
      video.playsInline = true;
      video.preload = "auto";
      await new Promise((resolve, reject) => {
        const onMeta = () => { video.removeEventListener("loadedmetadata", onMeta); resolve(); };
        video.addEventListener("loadedmetadata", onMeta);
        video.addEventListener("error", () => reject(new Error("Failed to load video: " + cfg.baseVideo)), { once: true });
      });
      try { await video.play(); video.pause(); video.currentTime = 0; } catch { }
      return video;
    }

    let _razorpayLogoCache = null;
    let _campaignLogoCache = null;
    let _tickerImageCache = null;

    async function getRazorpayLogo() {
      if (_razorpayLogoCache !== null) return _razorpayLogoCache;
      try { _razorpayLogoCache = await loadImage(POSTER_OVERLAY.razorpayLogo.src); }
      catch { _razorpayLogoCache = false; }
      return _razorpayLogoCache;
    }
    async function getCampaignLogo() {
      if (_campaignLogoCache !== null) return _campaignLogoCache;
      try { _campaignLogoCache = await loadImage(POSTER_OVERLAY.campaignLogo.src); }
      catch { _campaignLogoCache = false; }
      return _campaignLogoCache;
    }
    async function getTickerImage() {
      if (_tickerImageCache !== null) return _tickerImageCache;
      try { _tickerImageCache = await loadImage(POSTER_OVERLAY.tickerImage.src); }
      catch { _tickerImageCache = false; }
      return _tickerImageCache;
    }

    async function preloadFonts() {
      if (!document.fonts) return;
      try {
        await Promise.all([
          document.fonts.load("400 100px Anton"),
          document.fonts.load("400 200px Anton"),
          document.fonts.load('400 100px "Special Gothic Condensed One"'),
          document.fonts.load('400 200px "Special Gothic Condensed One"'),
          document.fonts.load("900 80px Unbounded"),
          document.fonts.load("900 200px Unbounded"),
          document.fonts.load("400 32px Unbounded"),
          document.fonts.load("400 18px Inter"),
        ]);
        await document.fonts.ready;
      } catch { }
    }

    // ============================================================================
    //  SECTION 3 — Slab text rendering (engraving)
    // ============================================================================

    function resolveSlab(W, H) {
      const C = SLAB_CONFIG;
      return {
        anchor: { x: C.textAnchor.x * W, y: C.textAnchor.y * H },
        maxW: C.textMaxWidth * W,
        maxH: C.textMaxHeight * H,
        poly: C.clipPolygon.map(([nx, ny]) => [nx * W, ny * H]),
      };
    }

    let _slabLayerCache = { key: null, canvas: null };
    let _noisePatternCache = { key: null, canvas: null };

    function getNoisePattern(W, H, density, intensity) {
      const key = `${W}|${H}|${density.toFixed(3)}|${intensity.toFixed(3)}`;
      if (_noisePatternCache.key === key && _noisePatternCache.canvas) return _noisePatternCache.canvas;
      const c = document.createElement("canvas");
      c.width = W; c.height = H;
      const ctx = c.getContext("2d");
      const imgData = ctx.createImageData(W, H);
      const data = imgData.data;
      const aMax = intensity * 255;
      for (let i = 0; i < data.length; i += 4) {
        if (Math.random() < density) {
          const v = Math.random() < 0.5 ? 0 : 255;
          data[i] = v; data[i + 1] = v; data[i + 2] = v;
          data[i + 3] = (Math.random() * aMax) | 0;
        }
      }
      ctx.putImageData(imgData, 0, 0);
      _noisePatternCache = { key, canvas: c };
      return c;
    }

    /**
     * Greedy word-wrap with two cap dimensions:
     *   • Pixel width  — `maxWidth` measured via ctx.measureText
     *   • Char count   — `maxCharsPerLine` (RULE 4, defaults to Infinity)
     */
    function wrapGreedy(text, ctx, maxWidth, hyphenateAt = Infinity, maxCharsPerLine = Infinity) {
      const rawWords = (text || "").split(/\s+/).filter(Boolean);
      if (rawWords.length === 0) return [text || ""];
      const tokens = [];
      for (const w of rawWords) {
        if (w.length >= hyphenateAt) {
          const splitAt = Math.ceil(w.length / 2);
          tokens.push({ word: w.slice(0, splitAt) + "-", forceBreakAfter: true });
          tokens.push({ word: w.slice(splitAt), forceBreakAfter: false });
        } else {
          tokens.push({ word: w, forceBreakAfter: false });
        }
      }
      const lines = [];
      let cur = "";
      for (const t of tokens) {
        const tryLine = cur ? cur + " " + t.word : t.word;
        const fitsPixels = ctx.measureText(tryLine).width <= maxWidth;
        const fitsChars = tryLine.length <= maxCharsPerLine;
        if (fitsPixels && fitsChars) cur = tryLine;
        else { if (cur) lines.push(cur); cur = t.word; }
        if (t.forceBreakAfter) { lines.push(cur); cur = ""; }
      }
      if (cur) lines.push(cur);
      return lines.length ? lines : [text];
    }

    function wrapAndFit(text, ctx, opts) {
      const {
        fontFamily, fontWeight, maxWidth,
        letterSpacing,
        minFontSize = 30, maxFontSize = 70,
        hyphenateMinLength = Infinity,
        maxLines = 3,
        maxCharsPerLine = Infinity,
        narrowLineThreshold = 0,
        overflowLineThreshold = Infinity,
        overflowMinFontSize = 0,
        overflowInputCharThreshold = Infinity,
      } = opts;

      const applyFont = (size) => {
        ctx.font = `${fontWeight} ${size}px ${fontFamily}`;
        if ("letterSpacing" in ctx) ctx.letterSpacing = `${letterSpacing * size}px`;
      };
      const wrap = () => wrapGreedy(text, ctx, maxWidth, hyphenateMinLength, maxCharsPerLine);

      // RULE 6 (early-fire)
      if (
        overflowMinFontSize > 0 &&
        text &&
        text.length > overflowInputCharThreshold
      ) {
        applyFont(overflowMinFontSize);
        return { fontSize: overflowMinFontSize, lines: wrap() };
      }

      applyFont(maxFontSize);
      const linesAtMax = wrap();
      if (linesAtMax.length <= maxLines) {
        return { fontSize: maxFontSize, lines: linesAtMax };
      }
      // RULE 5 — short-line override (capped at overflowLineThreshold).
      if (
        narrowLineThreshold > 0 &&
        linesAtMax.length <= overflowLineThreshold &&
        linesAtMax.every((l) => l.length < narrowLineThreshold)
      ) {
        return { fontSize: maxFontSize, lines: linesAtMax };
      }

      let lo = minFontSize, hi = maxFontSize - 1;
      let best = null;
      while (lo <= hi) {
        const mid = Math.floor((lo + hi) / 2);
        applyFont(mid);
        const lines = wrap();
        if (lines.length <= maxLines) {
          best = { fontSize: mid, lines };
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      if (best) return best;

      applyFont(minFontSize);
      const fallbackLines = wrap();

      // RULE 6 (post-fallback)
      if (
        overflowMinFontSize > 0 &&
        overflowMinFontSize < minFontSize &&
        fallbackLines.length > overflowLineThreshold
      ) {
        applyFont(overflowMinFontSize);
        return { fontSize: overflowMinFontSize, lines: wrap() };
      }
      return { fontSize: minFontSize, lines: fallbackLines };
    }

    function renderSlabLayerInto(ctx, text, W, H) {
      const C = SLAB_CONFIG;
      const { anchor, maxW, maxH, poly } = resolveSlab(W, H);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(poly[0][0], poly[0][1]);
      for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
      ctx.closePath();
      ctx.clip();

      ctx.translate(anchor.x, anchor.y);
      ctx.rotate((C.rotation * Math.PI) / 180);
      ctx.transform(1, Math.tan((C.skewY * Math.PI) / 180), Math.tan((C.skewX * Math.PI) / 180), 1, 0, 0);

      const { lines, fontSize } = wrapAndFit(text, ctx, {
        fontFamily: C.fontFamily, fontWeight: C.fontWeight,
        maxWidth: maxW, maxHeight: maxH,
        lineHeight: C.lineHeight, letterSpacing: C.letterSpacing,
        minFontSize: C.minFontSize ?? 30,
        maxFontSize: C.maxFontSize ?? 70,
        hyphenateMinLength: C.hyphenateMinLength ?? Infinity,
        maxLines: C.maxLines ?? 3,
        maxCharsPerLine: C.maxCharsPerLine ?? Infinity,
        narrowLineThreshold: C.narrowLineThreshold ?? 0,
        overflowLineThreshold: C.overflowLineThreshold ?? Infinity,
        overflowMinFontSize: C.overflowMinFontSize ?? 0,
        overflowInputCharThreshold: C.overflowInputCharThreshold ?? Infinity,
      });

      ctx.font = `${C.fontWeight} ${fontSize}px ${C.fontFamily}`;
      ctx.textAlign = C.textAlign || "center";
      ctx.textBaseline = "middle";
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${C.letterSpacing * fontSize}px`;

      const lh = fontSize * C.lineHeight;
      const startY = (-lh * lines.length) / 2 + lh / 2;
      const drawX = C.textAlign === "left" ? -maxW / 2 : C.textAlign === "right" ? maxW / 2 : 0;

      // 1 — Main carved fill
      ctx.fillStyle = C.fontColor;
      lines.forEach((line, i) => ctx.fillText(line, drawX, startY + i * lh));

      // 2 — Noise inside glyphs
      if (C.noise?.enabled) {
        ctx.save();
        const m = ctx.getTransform();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalCompositeOperation = "source-atop";
        ctx.drawImage(getNoisePattern(W, H, C.noise.density, C.noise.intensity), 0, 0);
        ctx.setTransform(m);
        ctx.restore();
      }

      // 3 — Inner shadow via inverse-text mask + canvas shadow + source-atop
      if (C.innerShadow?.enabled) {
        const mask = document.createElement("canvas");
        mask.width = W; mask.height = H;
        const mctx = mask.getContext("2d");
        mctx.fillStyle = "#000";
        mctx.fillRect(0, 0, W, H);
        mctx.translate(anchor.x, anchor.y);
        mctx.rotate((C.rotation * Math.PI) / 180);
        mctx.transform(1, Math.tan((C.skewY * Math.PI) / 180), Math.tan((C.skewX * Math.PI) / 180), 1, 0, 0);
        mctx.font = ctx.font;
        mctx.textAlign = ctx.textAlign;
        mctx.textBaseline = ctx.textBaseline;
        if ("letterSpacing" in mctx) mctx.letterSpacing = ctx.letterSpacing;
        mctx.globalCompositeOperation = "destination-out";
        lines.forEach((line, i) => mctx.fillText(line, drawX, startY + i * lh));

        ctx.save();
        const m = ctx.getTransform();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.shadowColor = C.innerShadow.color;
        ctx.shadowOffsetX = C.innerShadow.offsetX;
        ctx.shadowOffsetY = C.innerShadow.offsetY;
        ctx.shadowBlur = C.innerShadow.blur;
        ctx.globalCompositeOperation = "source-atop";
        ctx.drawImage(mask, 0, 0);
        ctx.setTransform(m);
        ctx.restore();
      }

      ctx.restore();
    }

    function getSlabTextLayer(text, W, H) {
      const C = SLAB_CONFIG;
      const key = JSON.stringify([text, W, H,
        C.fontColor, C.fontFamily, C.fontWeight,
        C.textAnchor, C.textMaxWidth, C.textMaxHeight, C.minFontSize,
        C.clipPolygon, C.skewX, C.skewY, C.rotation,
        C.lineHeight, C.letterSpacing, C.textAlign,
        C.hyphenateMinLength, C.noise, C.innerShadow]);
      if (_slabLayerCache.key === key && _slabLayerCache.canvas) return _slabLayerCache.canvas;
      const layer = document.createElement("canvas");
      layer.width = W; layer.height = H;
      renderSlabLayerInto(layer.getContext("2d"), text, W, H);
      _slabLayerCache = { key, canvas: layer };
      return layer;
    }

    function drawSlabText(ctx, text, W, H) {
      const layer = getSlabTextLayer(text, W, H);
      ctx.save();
      ctx.globalCompositeOperation = SLAB_CONFIG.compositeMode || "source-over";
      ctx.globalAlpha = SLAB_CONFIG.opacity ?? 1;
      ctx.drawImage(layer, 0, 0);
      ctx.restore();
    }

    // ============================================================================
    //  SECTION 4 — Poster overlay
    // ============================================================================

    /**
     * Trim 3-word names to first + last (drop the middle word).
     * "Aman Oasis Singh" → "Aman Singh". Names with 1, 2, or 4+ words
     * are returned unchanged.
     *
     * Rationale: long middle names blow past `name.maxWidth` and force a
     * 2-line wrap even when first + last alone would have fit on one
     * line — the banner reads cleaner with two-word names. Applied only
     * to the exact 3-word case to keep behaviour predictable for hyphen-
     * ated surnames and longer pen-names.
     */
    function trimNameForDisplay(name) {
      const parts = (name || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length === 3) return `${parts[0]} ${parts[2]}`;
      return name;
    }

    /**
     * Name wrap: prefer ONE line. Only split into two lines when the
     * full name overflows `maxW` at the configured font. When we do
     * split, pick the space closest to the middle for a balanced 2-line
     * stack (matches the Figma reference for long names like "MATT
     * CHITHRANJAN"). Short names with spaces ("AMAN O S") stay on one
     * line — same as Figma node 4313:95.
     */
    function wrapPosterName(name, ctx, maxW) {
      // Fits on one line — never split, regardless of spaces.
      if (ctx.measureText(name).width <= maxW) return [name];
      // No space to break on — accept the overflow rather than splitting
      // mid-word; the renderer doesn't auto-fit the name (yet).
      if (!name.includes(" ")) return [name];
      const mid = Math.floor(name.length / 2);
      let splitIdx = -1, bestDist = Infinity;
      for (let i = 0; i < name.length; i++) {
        if (name[i] === " " && Math.abs(i - mid) < bestDist) {
          splitIdx = i;
          bestDist = Math.abs(i - mid);
        }
      }
      if (splitIdx === -1) return [name];
      return [name.slice(0, splitIdx), name.slice(splitIdx + 1)];
    }

    /**
     * Greedy multi-line wrap for the subtitle copy. Identical spirit to
     * wrapGreedy() in the slab renderer, but lighter — no hyphenation,
     * no auto-fit. Caller picks the fixed font size.
     */
    function wrapPosterSubtitle(text, ctx, maxW) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let cur = "";
      for (const w of words) {
        const tryLine = cur ? cur + " " + w : w;
        if (ctx.measureText(tryLine).width <= maxW) cur = tryLine;
        else { if (cur) lines.push(cur); cur = w; }
      }
      if (cur) lines.push(cur);
      return lines.length ? lines : [text];
    }

    /**
     * Centre-anchored title-stack renderer.
     *
     * The eyebrow + name + subtitle behave like a SINGLE auto-layout
     * group: total stack height grows when the name wraps to 2 lines or
     * the subtitle wraps further, and the WHOLE group re-centres on
     * `title.anchorY` so a 1-line name and a 2-line name share the same
     * imaginary middle point (visible in Figma nodes 4313:10 vs 4313:95).
     *
     * Algorithm:
     *   1. Pre-measure each block's height with its real line count.
     *   2. Sum: H = eyebrow.lineHeight + g1 + nLines×n.lh + g2 + sLines×s.lh
     *   3. startY = anchorY − H/2  (top of eyebrow's line-box)
     *   4. Render top-down from startY with the per-block heights as the
     *      step. Each block uses textBaseline appropriate to its layout:
     *        • eyebrow: "middle" inside the eyebrow line-box
     *        • name / subtitle: "top" at the block start (line-height is
     *          the step, not a centred line-box)
     */
    function renderPosterOverlay(ctx, userData, logos) {
      const P = POSTER_OVERLAY;
      const T = P.title;
      const { name, company } = userData;

      // Logos
      if (logos.razorpay) {
        const RL = P.razorpayLogo;
        ctx.drawImage(logos.razorpay, RL.x, RL.y, RL.w, RL.h);
      }
      if (logos.campaign) {
        const CL = P.campaignLogo;
        ctx.drawImage(logos.campaign, CL.x, CL.y, CL.w, CL.h);
      }

      // ── Pre-measure the stack ───────────────────────────────────────
      // Block 1 — eyebrow (always single-line "THANK YOU"): height = its
      // configured line-box height (lineHeight), not fontSize. Glyphs
      // are vertically centred inside that box.
      const eyebrowH = T.eyebrow.lineHeight || T.eyebrow.fontSize;

      // Block 2 — name. Wrap against `name.maxWidth` at the configured
      // font; nameLines decides the block's height (lines × lineHeight).
      ctx.fillStyle = P.textColor;
      ctx.textAlign = "center";
      const N = T.name;
      ctx.font = `${N.fontWeight} ${N.fontSize}px '${N.fontFamily}', sans-serif`;
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${N.letterSpacing}px`;
      const displayName = trimNameForDisplay(name || "YOUR NAME").toUpperCase();
      const nameLines = wrapPosterName(displayName, ctx, N.maxWidth);
      const nameH = nameLines.length * N.lineHeight;

      // Block 3 — subtitle. Wrap the prefix + company against the
      // narrower `subtitle.maxWidth`. Same as the old renderer.
      const S = T.subtitle;
      ctx.font = `${S.fontWeight} ${S.fontSize}px '${S.fontFamily}', sans-serif`;
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${S.letterSpacing}px`;
      const prefixLines = wrapPosterSubtitle(S.prefix.trim(), ctx, S.maxWidth);
      const companyLines = wrapPosterSubtitle((company || "YOUR COMPANY").toUpperCase(), ctx, S.maxWidth);
      const subLines = [...prefixLines, ...companyLines];
      const subH = subLines.length * S.lineHeight;

      const stackH = eyebrowH + T.eyebrowToNameGap + nameH + T.nameToSubtitleGap + subH;
      const startY = T.anchorY - stackH / 2;

      // ── Render top-down ─────────────────────────────────────────────
      // Eyebrow — centred in its line-box.
      const E = T.eyebrow;
      ctx.font = `${E.fontWeight} ${E.fontSize}px '${E.fontFamily}', sans-serif`;
      ctx.textBaseline = "middle";
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${E.letterSpacing}px`;
      ctx.fillText(E.text, T.centerX, startY + eyebrowH / 2);

      // Name — top-aligned per line; step = N.lineHeight. Restore the
      // canvas font + letterSpacing before drawing (the pre-measure pass
      // left them at the subtitle's values).
      ctx.font = `${N.fontWeight} ${N.fontSize}px '${N.fontFamily}', sans-serif`;
      ctx.textBaseline = "top";
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${N.letterSpacing}px`;
      const nameTop = startY + eyebrowH + T.eyebrowToNameGap;
      nameLines.forEach((line, i) => ctx.fillText(line, T.centerX, nameTop + i * N.lineHeight));

      // Subtitle — top-aligned per line; step = S.lineHeight.
      ctx.font = `${S.fontWeight} ${S.fontSize}px '${S.fontFamily}', sans-serif`;
      ctx.textBaseline = "top";
      if ("letterSpacing" in ctx) ctx.letterSpacing = `${S.letterSpacing}px`;
      const subTop = nameTop + nameH + T.nameToSubtitleGap;
      subLines.forEach((line, i) => ctx.fillText(line, T.centerX, subTop + i * S.lineHeight));

      // ── Diagonal blue ticker (pre-rotated SVG, drawn as flat image) ──
      const TK = P.ticker;
      if (logos.ticker) {
        const nw = logos.ticker.naturalWidth || logos.ticker.width;
        const nh = logos.ticker.naturalHeight || logos.ticker.height;
        const drawH = nw && nh ? TK.w * (nh / nw) : TK.w * 0.2195;
        ctx.drawImage(logos.ticker, TK.x, TK.y, TK.w, drawH);
      }
    }

    function drawPosterFrame(ctx, mediaEl, userData, logos) {
      const P = POSTER_OVERLAY;
      ctx.fillStyle = P.bg;
      ctx.fillRect(0, 0, FINAL_WIDTH, FINAL_HEIGHT);
      if (mediaEl) {
        const mw = mediaEl.naturalWidth || mediaEl.videoWidth || mediaEl.width || 0;
        const mh = mediaEl.naturalHeight || mediaEl.videoHeight || mediaEl.height || 0;
        if (mw && mh) {
          // Scale to fill the final canvas, preserving aspect ratio.
          // Mobile browsers may decode source videos at lower resolution,
          // so we always scale rather than drawing at native size.
          const scale = Math.max(FINAL_WIDTH / mw, FINAL_HEIGHT / mh);
          const drawW = mw * scale;
          const drawH = mh * scale;
          const drawX = (FINAL_WIDTH - drawW) / 2;
          const drawY = (FINAL_HEIGHT - drawH) / 2;
          ctx.drawImage(mediaEl, drawX, drawY, drawW, drawH);
        }
      }
      renderPosterOverlay(ctx, userData, logos);
    }

    function composeOneFrame(srcCtx, finalCtx, video, frameIndex, oddsText, W, H, userData, logos, cutFrame) {
      srcCtx.globalCompositeOperation = "source-over";
      srcCtx.globalAlpha = 1;
      srcCtx.drawImage(video, 0, 0, W, H);
      if (frameIndex < cutFrame && oddsText) drawSlabText(srcCtx, oddsText, W, H);
      drawPosterFrame(finalCtx, srcCtx.canvas, userData, logos);
    }

    // ============================================================================
    //  SECTION 5 — Render pipeline
    // ============================================================================

    async function processVideoToPoster({ video, persona, userData, logos, onProgress }) {
      const W = video.videoWidth, H = video.videoHeight;
      const cutFrame = persona.textCutFrame ?? 45;
      const fps = persona.videoFps ?? 24;
      // RULE 3 — hard truncate user input to SLAB_CONFIG.maxInputChars
      // before it ever reaches the wrap algorithm.
      const oddsText = (userData.oddsText || "")
        .toUpperCase()
        .slice(0, SLAB_CONFIG.maxInputChars ?? 30);
      const overlayUser = { name: userData.name, company: userData.company };

      const srcCanvas = document.createElement("canvas");
      srcCanvas.width = W; srcCanvas.height = H;
      const srcCtx = srcCanvas.getContext("2d");

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = FINAL_WIDTH; finalCanvas.height = FINAL_HEIGHT;
      const finalCtx = finalCanvas.getContext("2d");

      const stream = finalCanvas.captureStream(fps);
      const mimeType =
        MediaRecorder.isTypeSupported("video/mp4;codecs=avc1.42E01E") ? "video/mp4;codecs=avc1.42E01E" :
          MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4" :
            MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9" :
              "video/webm";
      const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      const recorderStopped = new Promise(r => { recorder.onstop = () => r(); });

      composeOneFrame(srcCtx, finalCtx, video, 0, oddsText, W, H, overlayUser, logos, cutFrame);

      let frameIndex = 0, lastSeenMediaTime = -1;
      const useRVFC = typeof video.requestVideoFrameCallback === "function";

      recorder.start();
      try { video.currentTime = 0; } catch { }
      await video.play();

      await new Promise((resolve, reject) => {
        const finish = () => { try { recorder.stop(); } catch { } resolve(); };
        function step(_now, meta) {
          const t = meta ? meta.mediaTime : video.currentTime;
          if (t === lastSeenMediaTime) {
            if (useRVFC) video.requestVideoFrameCallback(step);
            return;
          }
          lastSeenMediaTime = t;
          frameIndex = Math.round(t * fps);
          composeOneFrame(srcCtx, finalCtx, video, frameIndex, oddsText, W, H, overlayUser, logos, cutFrame);
          onProgress?.(Math.min(1, t / (video.duration || 1)));
          if (!video.ended && !video.paused) {
            if (useRVFC) video.requestVideoFrameCallback(step);
            else requestAnimationFrame(() => step());
          }
        }
        video.addEventListener("ended", finish, { once: true });
        video.addEventListener("error", () => reject(new Error("video error during capture")), { once: true });
        if (useRVFC) video.requestVideoFrameCallback(step);
        else requestAnimationFrame(() => step());
      });

      await recorderStopped;
      const blob = new Blob(chunks, { type: mimeType });
      return { blob, mimeType, frameCount: frameIndex + 1, textCutFrame: cutFrame };
    }

    // ============================================================================
    //  SECTION 6 — Form wiring
    // ============================================================================

    const $name = document.getElementById("f-name");
    const $company = document.getElementById("f-company");
    const $odds = document.getElementById("f-odds");
    const $avatar = document.getElementById("f-avatar");
    const $weapon = document.getElementById("f-weapon");
    const $btnGen = document.getElementById("btn-generate");
    const $btnFrame = document.getElementById("btn-preview-frame");
    const $btnDl = document.getElementById("btn-download");
    const $state = document.getElementById("state-readout");
    const $preview = document.getElementById("preview-canvas");
    const $video = document.getElementById("result-video");

    let lastBlob = null;
    let lastMime = "video/mp4";

    function setState(text) { $state.textContent = text; }
    function setProgress(p) {
      const pct = Math.round((p || 0) * 100);
      if (pct > 0 && pct < 100) $state.textContent = `rendering · ${pct}%`;
    }

    function readInputs() {
      return {
        name: $name.value.trim(),
        company: $company.value.trim(),
        odds: $odds.value.trim(),
        avatar: $avatar.value,
        weapon: $weapon.value,
      };
    }

    async function loadAllLogos() {
      const [r, c, t] = await Promise.all([
        getRazorpayLogo(),
        getCampaignLogo(),
        getTickerImage(),
      ]);
      return { razorpay: r, campaign: c, ticker: t };
    }

    // Renders just the first frame to the on-screen preview canvas — useful
    // for iterating on overlay layout without waiting for full video capture.
    async function previewFirstFrame() {
      try {
        setState("loading fonts + assets…");
        setProgress(0);
        await preloadFonts();
        const inputs = readInputs();
        const persona = getComboConfig(inputs.avatar, inputs.weapon);
        const [video, logos] = await Promise.all([
          loadComboVideo(inputs.avatar, inputs.weapon),
          loadAllLogos(),
        ]);
        setState("compositing first frame…");
        const W = video.videoWidth, H = video.videoHeight;
        const srcCanvas = document.createElement("canvas");
        srcCanvas.width = W; srcCanvas.height = H;
        const srcCtx = srcCanvas.getContext("2d");
        const finalCtx = $preview.getContext("2d");
        // RULE 3 — same truncation as the full render pipeline.
        const oddsText = (inputs.odds || "")
          .toUpperCase()
          .slice(0, SLAB_CONFIG.maxInputChars ?? 30);
        composeOneFrame(
          srcCtx, finalCtx, video, 0, oddsText, W, H,
          { name: inputs.name, company: inputs.company }, logos, persona.textCutFrame
        );
        $preview.style.display = "block";
        $video.style.display = "none";
        setProgress(1);
        setState(`first frame ready · combo=${persona.label}`);
      } catch (err) {
        console.error(err);
        setState("error: " + err.message);
      }
    }

    async function generate() {
      $btnGen.disabled = true;
      $btnFrame.disabled = true;
      $btnDl.disabled = true;
      try {
        setState("loading fonts + assets…");
        setProgress(0);
        await preloadFonts();
        const inputs = readInputs();
        const persona = getComboConfig(inputs.avatar, inputs.weapon);
        const [video, logos] = await Promise.all([
          loadComboVideo(inputs.avatar, inputs.weapon),
          loadAllLogos(),
        ]);
        setState(`rendering · combo=${persona.label}`);
        const result = await processVideoToPoster({
          video,
          persona,
          userData: { name: inputs.name, company: inputs.company, oddsText: inputs.odds },
          logos,
          onProgress: setProgress,
        });
        lastBlob = result.blob;
        lastMime = result.mimeType;
        const url = URL.createObjectURL(result.blob);
        $video.src = url;
        $video.style.display = "block";
        $preview.style.display = "none";
        setProgress(1);
        setState(`done · ${result.frameCount} frames · ${(result.blob.size / 1024 / 1024).toFixed(1)} MB`);
        $btnDl.disabled = false;
      } catch (err) {
        console.error(err);
        setState("error: " + err.message);
      } finally {
        $btnGen.disabled = false;
        $btnFrame.disabled = false;
      }
    }

    function download() {
      if (!lastBlob) return;
      const ext = lastMime.includes("mp4") ? "mp4" : "webm";
      const safeName = ($name.value || "founder").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(lastBlob);
      a.download = `founders-brick-${safeName}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    $btnGen.addEventListener("click", generate);
    $btnFrame.addEventListener("click", previewFirstFrame);
    $btnDl.addEventListener("click", download);

    // Auto-render the first frame on load so the viewer isn't blank.
    window.addEventListener("load", () => { previewFirstFrame(); });
  </script>
</body>
